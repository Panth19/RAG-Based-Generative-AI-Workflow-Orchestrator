# ============================================================
# RAG Enterprise Platform - Docker Compose (Local Development)
# ============================================================

version: '3.8'

services:
  # ============================================================
  # Frontend (React + Vite)
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./src:/app/src
    depends_on:
      - backend

  # ============================================================
  # Backend (FastAPI)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=sqlite:///data/chat_history.db
    volumes:
      - ./backend:/app
      - backend-data:/var/task/data
    depends_on:
      - qdrant

  # ============================================================
  # Qdrant Vector Database
  # ============================================================
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  backend-data:
  qdrant-data:
